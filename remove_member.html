<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Remover membro - Setor Mapper</title>
  <link rel="stylesheet" href="styles.css" />
  
  <!-- Firebase Initialization -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getFirestore } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBcNRLYvv22b9VQ5_NgT2PiNWusI3y7YCk",
      authDomain: "mappershz.firebaseapp.com",
      projectId: "mappershz",
      storageBucket: "mappershz.firebasestorage.app",
      messagingSenderId: "132498202128",
      appId: "1:132498202128:web:c3d7ba2b2f2f425638f495",
      measurementId: "G-6DDELDM86C"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    // Torna db global para usar em scripts-crud.js
    window.firebaseApp = app;
    window.db = db;
    window.firebaseReady = true;
  </script>
</head>
<body>
  <div class="scene" aria-hidden="true"><div class="sphere"></div><div class="cube"></div><div class="cube alt"></div></div>
  <div class="app-container">
    <header class="app-header"><img src="https://cdn.discordapp.com/attachments/1472997423646511278/1489422331507114074/logo_new.png?ex=69d05c23&is=69cf0aa3&hm=2f8dd2c5c25e8a49e93f9d666dc236921c4e452bcdf600931204367757dde5c9" alt="Logo" style="height: 50px; margin-bottom: 0.5rem; display: block;" /><h1>Remover Membro</h1><p>Informe NICK e RG do membro.</p></header>
    <main class="panel">
      <form id="crudForm" class="crud-form" data-action="remove" data-context="remove_member">
        <label>NICK<input id="fieldNick" name="nick" type="text" required /></label>
        <label>RG<input id="fieldRg" name="rg" type="text" required /></label>
        <button type="submit" class="btn">Confirmar</button>
      </form>
      <p id="crudMessage" class="message"></p>
      <p style="text-align: center;">
        <a class="btn-footer" id="backBtn" href="responsavel.html">Voltar</a>
      </p>
    </main>
  </div>
  <script src="scripts-crud.js"></script>
  <script>
    const role = sessionStorage.getItem('mapperAdminRole');
    const backBtn = document.getElementById('backBtn');
    if (role === 'Auxiliar') {
      backBtn.href = 'auxiliar.html';
    } else {
      backBtn.href = 'responsavel.html';
    }
  </script>
</body>
</html>
